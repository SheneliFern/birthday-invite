<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>You’ve Been Invited • Sheneli F’do</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #f5ebe0;
      font-family: sans-serif;
    }

    /* ── Single scroll container with snap ── */
    #scroller {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    /* ── Each section snaps to the viewport ── */
    .section {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      height: 100svh;           /* 100% of screen, safe on iOS */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #f5ebe0;
      overflow: hidden;
    }

    /* ── Full-width image, capped at phone width ── */
    .section img.bg {
      width: 100%;
      max-width: 480px;
      display: block;
      margin: 0 auto;
      -webkit-user-drag: none;
      user-select: none;
      /* allow image to shrink if taller than viewport */
      max-height: 100%;
      object-fit: contain;
    }

    /* ── Section 1 is a tap target ── */
    #s1 { cursor: pointer; }
    #s1 img.bg { pointer-events: none; }

    #s1 .tap-hint {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #9e7a2c;
      animation: blink 2s ease-in-out infinite;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Section 2 scroll hints ── */
    .hint-up, .hint-down {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      pointer-events: none;
      animation: blink 2s ease-in-out infinite;
    }
    .hint-up   { top: 10px; }
    .hint-down { bottom: 10px; }

    .hint-up span, .hint-down span {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #9e7a2c;
      white-space: nowrap;
    }
    .hint-up .arrow, .hint-down .arrow {
      font-size: 0.9rem;
      color: #c9a84c;
    }
    .hint-up .arrow   { animation: bounce-up   1.6s ease-in-out infinite; }
    .hint-down .arrow { animation: bounce-down 1.6s ease-in-out infinite; }

    /* ── Section 3 extras ── */
    #s3 .extras {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 480px;
    }

    #s3 .rsvp-btn {
      display: block;
      width: min(220px, 55%);
      margin: 0.3rem auto 0.15rem;
      padding: 0.7rem 0;
      background: #6b1a2a;
      color: #e2c97e;
      font-size: 0.73rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border: 1px solid #c9a84c;
      transition: background 0.2s, color 0.2s;
    }
    #s3 .rsvp-btn:hover,
    #s3 .rsvp-btn:active {
      background: #c9a84c;
      color: #3d0a15;
    }

    #s3 .hint-up { top: 8px; }

    @keyframes blink      { 0%,100%{opacity:.3} 50%{opacity:1} }
    @keyframes bounce-up  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes bounce-down{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
  </style>
</head>
<body>
<div id="scroller">

  <!-- SECTION 1 — closed envelope -->
  <section id="s1" class="section" onclick="openEnvelope()">
    <img class="bg" src="Section-1.PNG" alt="You've been invited" />
    <p class="tap-hint">tap to open</p>
  </section>

  <!-- SECTION 2 — open envelope with photos -->
  <section id="s2" class="section">
    <img class="bg" src="Section-2.PNG" alt="Open envelope" />
    <!-- scroll up hint -->
    <div class="hint-up">
      <div class="arrow">&#8595;</div>
    </div>
    <!-- scroll down hint -->
    <div class="hint-down">
      <span>scroll for details</span>
      <div class="arrow">&#8595;</div>
    </div>
  </section>

  <!-- SECTION 3 — invitation details + RSVP -->
  <section id="s3" class="section">
    <img class="bg" src="Section-3.PNG" alt="Invitation details" />
    <div class="extras">
      <a class="rsvp-btn"
         href="https://wa.me/94773775678?text=yes"
         target="_blank"
         rel="noopener noreferrer">RSVP via WhatsApp</a>
    </div>
    <!-- scroll up hint -->
    <div class="hint-up">
      <div class="arrow" style="transform:rotate(180deg)">&#8595;</div>
    </div>
  </section>

</div><!-- end scroller -->

<script>
  // Tapping the envelope slowly scrolls to section 2
  function openEnvelope() {
    document.getElementById('s2').scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
